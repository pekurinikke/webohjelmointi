<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tapahtumatutka</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="page-header">
    <div class="container">
      <h1>Tampereen opiskelijatapahtumat</h1>
      <p class="subtitle">Selaa Tampereen alueen opiskelijatapahtumia viikoittain.</p>
    </div>
  </header>

  <main class="container">
    <section class="controls">
      <button id="prevBtn" class="nav-btn">← Edellinen viikko</button>
      <div class="date-controls">
        <label for="startDate">Viikko alkaa:</label>
        <input type="date" id="startDate" />
      </div>
      <button id="nextBtn" class="nav-btn">Seuraava viikko →</button>
    </section>

    <section class="extra-controls">
      <label class="checkbox-label">
        <input type="checkbox" id="sortHervanta" />
        <span>Näytä Hervannan lähellä olevat ensin</span>
      </label>
    </section>

    <section class="range-info">
      <h2 id="rangeTitle">Ladataan tapahtumia...</h2>
      <p id="eventCount"></p>
    </section>

    <section id="eventsContainer" class="events-grid">
      <!-- Tapahtumakortit renderöidään tänne -->
    </section>
  </main>

  <script src="scripts/events-fetch.js"></script>
</body>
</html>
