<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hervannan opiskelijatapahtumat</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Pieni perus-tyyli, jotta kortit näkyvät */
    .container { max-width: 900px; margin: auto; padding: 1rem; }
    .events-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(250px,1fr)); gap:1rem; }
    .event-card { padding: 1rem; border:1px solid #ccc; border-radius:8px; background:#f9f9f9; }
    .event-meta div { margin-bottom: 0.3rem; }
    .empty-state { text-align:center; padding:2rem; font-style:italic; }
    .nav-btn { margin: 0 0.5rem; padding:0.5rem 1rem; }
    .date-controls { display:inline-block; margin:0 1rem; }
  </style>
</head>
<body>
  <header class="page-header">
    <div class="container">
      <h1>Hervannan opiskelijatapahtumat</h1>
      <p class="subtitle">Selaa Hervannan alueen opiskelijatapahtumia 3 viikon jaksoissa.</p>
    </div>
  </header>

  <main class="container">
    <section class="controls">
      <button id="prevBtn" class="nav-btn">← Edelliset 3 viikkoa</button>
      <div class="date-controls">
        <label for="startDate">Aikaväli alkaa:</label>
        <input type="date" id="startDate" />
      </div>
      <button id="nextBtn" class="nav-btn">Seuraavat 3 viikkoa →</button>
    </section>

    <section class="range-info">
      <h2 id="rangeTitle">Ladataan tapahtumia...</h2>
      <p id="eventCount"></p>
    </section>

    <section id="eventsContainer" class="events-grid">
      <!-- Tapahtumat renderöidään tänne -->
    </section>
  </main>

  <!-- Skripti ladataan suhteellisella polulla, varmista että tiedoston nimi ja kansio täsmäävät -->
  <script src="scripts/events-fetch.js"></script>
</body>
</html>
