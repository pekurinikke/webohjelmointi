<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hervannan opiskelijatapahtumat</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Perustyylit tapahtumille */
    .events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }

    .event-card {
      background-color: #fff;
      padding: 1rem;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .event-card h3 {
      margin-top: 0;
    }

    .event-card p {
      margin: 0.3rem 0;
      font-size: 0.95rem;
    }

    .event-card a {
      color: #1a73e8;
      text-decoration: none;
      font-weight: bold;
    }

    .event-card a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header class="page-header">
    <div class="container">
      <h1>Hervannan opiskelijatapahtumat</h1>
      <p class="subtitle">
        Selaa Hervannan alueen opiskelijatapahtumia 3 viikon jaksoissa.
      </p>
    </div>
  </header>

  <main class="container">
    <section class="controls">
      <button id="prevBtn" class="nav-btn">← Edelliset 3 viikkoa</button>

      <div class="date-controls">
        <label for="startDate">Aikaväli alkaa:</label>
        <input type="date" id="startDate" />
      </div>

      <button id="nextBtn" class="nav-btn">Seuraavat 3 viikkoa →</button>
    </section>

    <section class="range-info">
      <h2 id="rangeTitle">Ladataan tapahtumia...</h2>
      <p id="eventCount"></p>
    </section>

    <section id="eventsContainer" class="events-grid">
      <!-- Eventit renderöidään tänne -->
    </section>
  </main>

  <script src="scripts/events-fetch.js"></script>
</body>
</html>
